server {
    listen 8000;

    # ── WebSocket (must come before the general /api/user/ block) ──
    location = /api/user/ws {
        proxy_pass http://user-service:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
    }

    # ── User Service (/api/user/* → user-service:8000/*) ─────────
    location /api/user/ {
        proxy_pass http://user-service:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
    }

    # ── Job Discovery Service (/api/jobs/* → job-discovery-service:8000/*) ─
    location /api/jobs/ {
        proxy_pass http://job-discovery-service:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
    }

    # ── Health ───────────────────────────────────────────────────
    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }
}
